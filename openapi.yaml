  /api/post:
    get:
      summary: Post by ID
      parameters:
        - name: id
          in: query
          schema:
            type: string
          example: '{{postId}}'
      responses: {}
      tags:
        - Posts
      description: >-
        ## **GET /api/post?id=POST_ID** – Fetch a Post


        Retrieve a single post by its ID, including author information.


        ### **Query Parameters**


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `id` | number | Yes | Post ID to fetch. |


        **Example Request**


        ```

        GET /api/post?id=123

         ```

        ### **Success Response (200 OK)**


        ```

        {  
             "id": 123,  
             "content": "I think this is a really interesting topic!",  
             "authorId": 12,  
             "threadId": 12,  
             "parentId": 45,  
             "isVisible": true,  
             "createdAt": "2026-03-06T15:45:00.000Z",  
             "updatedAt": "2026-03-06T15:45:00.000Z",  
             "author": {    "id": 12,    "username": "goat",    "avatar": "https://example.com/avatar.jpg"  }
        }

         ```

        ### **Error Responses**


        | Status | Condition | Response |

        | --- | --- | --- |

        | 400 | Missing or invalid post ID | `{ "error": "Post ID is required."
        }` / `{ "error": "Invalid post ID." }` |

        | 404 | Post not found | `{ "error": "Post not found." }` |

        | 500 | Server error | `{ "error": "Failed to fetch post" }` |
    post:
      summary: Create Post
      responses:
        default:
          description: Create Reply to Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      description: >-
        ## **POST /api/post** – Create a Post


        Create a new post in a thread or as a reply to another post.  
          
        Automatically checks content for toxicity using Hugging Face Inference
        API.


        ### **Authentication**


        - Header: `Authorization: Bearer`
            

        ### **Request Body**


        | Field | Type | Required | Description |

        | --- | --- | --- | --- |

        | `content` | string | Yes | Text content of the post. |

        | `threadId` | number | Yes, if posting in a thread | ID of the thread
        to post in. |

        | `parentId` | number | No | ID of the parent post if replying. |


        **Example Request Body**


        ```

        {  "content": "I think this is a really interesting topic!", 
        "threadId": 12,  "parentId": 45}

         ```

        ### **Behavior & Rules**


        - Posts are **rejected if content is highly toxic** (`toxic` ≥ 0.5 or
        `severe_toxic`).
            
        - Posts with low toxicity are **hidden and reported** for moderator
        review.
            
        - Posts in **closed or hidden threads** are rejected.
            
        - Posts replying to **hidden parent posts** are rejected.
            

        ### **Success Response (200 OK)**


        ```

        {  
             "id": 123,  
             "content": "I think this is a really interesting topic!",  
             "authorId": 12,  
             "threadId": 12,  
             "parentId": 45,  
             "isVisible": true,  
             "createdAt": "2026-03-06T15:45:00.000Z",  
             "updatedAt": "2026-03-06T15:45:00.000Z"
        }

         ```

        > 


        **Note:** `isVisible` may be `false` if the post is flagged for
        low-toxicity content.

         
          

        ### **Error Responses**


        | Status | Condition | Response |

        | --- | --- | --- |

        | 400 | Missing content | `{ "error": "Content is required to create a
        post." }` |

        | 400 | Invalid threadId | `{ "error": "Invalid thread ID." }` |

        | 400 | Invalid parentId | `{ "error": "Invalid parent post ID." }` |

        | 401 | Missing/invalid token | `{ "error": "Unauthorized" }` / `{
        "error": "Invalid token" }` |

        | 403 | User banned | `{ "error": "User is banned" }` |

        | 403 | Thread closed, hidden, not open yet | `{ "error": "Thread is
        closed." }` / `{ "error": "Thread is hidden." }` / `{ "error": "Thread
        is not open yet." }` |

        | 403 | Parent post hidden | `{ "error": "Parent post is hidden." }` |

        | 404 | Thread or parent post not found | `{ "error": "Thread not
        found." }` / `{ "error": "Parent post not found." }` |

        | 422 | Highly toxic content | `{ "error": "Content is too toxic and has
        been rejected." }` |

        | 500 | Server error | `{ "error": "Failed to create post" }` |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
            example:
              title: best title
              content: this is the cool content of the post
  /api/post/{postId}/:
    put:
      summary: Update Post
      responses:
        default:
          description: Hide the Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      description: >-
        ## **PUT /api/post/\[id\]** – Update a Post


        Update the content or visibility of a post. Content is checked for
        toxicity using Hugging Face Inference API.


        ### **Authentication**


        - Header: `Authorization: Bearer`
            

        ### **URL Parameters**


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `id` | number | Yes | ID of the post to update. |


        ### **Request Body**


        | Field | Type | Required | Description |

        | --- | --- | --- | --- |

        | `content` | string | Yes | New content of the post. Cannot be empty. |

        | `isHidden` | boolean | No | Optional flag to hide or show the post. |

        | `flagged` | boolean | No | Optional flag to mark the post for review.
        |


        **Example Request Body**


        ```

        {  "content": "Updated content of the post",  "isHidden": false}

         ```

        ### **Behavior & Rules**


        - Only the **author** or an **admin** can update the post.
            
        - Posts in **closed threads** cannot be updated.
            
        - Content is analyzed for toxicity:
            
            - Low toxicity (`toxic` < 0.5) → post is updated and reported for review.
                
            - High toxicity (`toxic` ≥ 0.5 or `severe_toxic`) → update is rejected and reported.
                
        - Post `version` is incremented with each successful update.
            

        ### **Success Response (200 OK)**


        ```

        {  
             "id": 123,  
             "content": "Updated content of the post",  
             "authorId": 12,  
             "threadId": 45,  
             "parentId": null,  
             "isHidden": false,  
             "version": 2,  
             "createdAt": "2026-03-06T15:45:00.000Z",  
             "updatedAt": "2026-03-06T16:00:00.000Z"
        }

         ```

        ### **Error Responses**


        | Status | Condition | Response |

        | --- | --- | --- |

        | 400 | Missing or empty content | `{ "error": "Missing content field"
