        (inclusive). Must be used with `toDate`. |

        | `toDate` | string (YYYY-MM-DD) | No | End of a date range (inclusive).
        Must be used with `fromDate`. Maximum range: 14 days. |

        | `stage` | string (`regular` | `preseason` | `playoffs`) | No | Filter
        matches by stage. |

        | `teamId` | string | number | No | External team ID to filter matches
        by a specific team. |


        **Important:**


        - You must provide **at least one filter**: `date`, `stage`, or a date
        range (`fromDate` + `toDate`).
            
        - `date` is for single-day queries; `fromDate` + `toDate` is for ranges.
        They **cannot be combined**.
            

        ---


        ## **Success Response (200 OK)**


        ```

        {  
             "status": 200,  
             "filters": {    "date": "2026-03-06",    "fromDate": null,    "toDate": null,    "stage": "regular",    "teamId": "1610612738"  },  
             "count": 2,  
             "matches": 
             [    
                {      "matchId": "12345",      "homeTeam": "Boston Celtics",      "awayTeam": "Miami Heat",      "tipOff": "2026-03-06T00:30:00.000Z",      "status": "scheduled",      "score": { "home": null, "away": null },      "venue": "TD Garden",      "stage": "regular"    },    
                {      "matchId": "12346",      "homeTeam": "New York Knicks",      "awayTeam": "Brooklyn Nets",      "tipOff": "2026-03-06T03:00:00.000Z",      "status": "finished",      "score": { "home": 110, "away": 104 },      "venue": "Madison Square Garden",      "stage": "regular"    }  
             ],  
             "availableMatchdays": ["2026-03-06"],  
             "availableStages": ["regular"],  
             "dataSource": "external-api"     
        }

         ```

        **Notes:**


        - `filters`: Echoes the filters used in the request.
            
        - `count`: Number of matches returned.
            
        - `matches`: Array of normalized match objects.
            
        - `availableMatchdays`: All dates present in the returned data.
            
        - `availableStages`: All stages present in the returned data.
            
        - `dataSource`: Either `"external-api"`, `"database-cache"`, or
        `"database-fallback"`.
            

        ---


        ## **Match Object Schema**


        | Field | Type | Description |

        | --- | --- | --- |

        | `matchId` | string | Unique identifier for the match. |

        | `homeTeam` | string | Name of the home team. |

        | `awayTeam` | string | Name of the away team. |

        | `tipOff` | string (ISO 8601) | Scheduled tip-off time. |

        | `status` | string (`scheduled` | `live` | `finished`) | Current match
        status. |

        | `score` | object | Home and away scores (null if not available). |

        | `score.home` | number | null | Home team score. |

        | `score.away` | number | null | Away team score. |

        | `venue` | string | null | Match venue (if available). |

        | `stage` | string | Match stage (`regular`, `preseason`, `playoffs`). |


        ---


        ## **Error Responses**


        ### **400 Bad Request**


        | Condition | Response |

        | --- | --- |

        | No filters provided | `{ "status": 400, "error": "Provide at least one
        filter: date or stage." }` |

        | `date` + `fromDate`/`toDate` used together | `{ "status": 400,
        "error": "Use either date or fromDate/toDate, not both." }` |

        | Only one of `fromDate` or `toDate` provided | `{ "status": 400,
        "error": "Provide both fromDate and toDate." }` |

        | Invalid date format | `{ "status": 400, "error": "Invalid date. Use
        YYYY-MM-DD." }` |

        | Invalid date range format | `{ "status": 400, "error": "Invalid date
        range. Use YYYY-MM-DD for fromDate and toDate." }` |

        | `toDate` before `fromDate` | `{ "status": 400, "error": "toDate must
        be on or after fromDate." }` |

        | Date range exceeds 14 days | `{ "status": 400, "error": "Date range
        cannot exceed 14 days." }` |

        | Invalid stage value | `{ "status": 400, "error": "Invalid stage. Use
        regular, preseason, or playoffs." }` |


        ### **502 Upstream Failure**


        ```

        { "status": 502, "error": "Failed to fetch match data from upstream
        provider." }

         ```

        ### **500 Internal Error**


        | Condition | Response |

        | --- | --- |

        | Missing external API URL | `{ "status": 500, "error":
        "NBA_API_BASE_URL is not configured." }` |

        | Generic failure | `{ "status": 500, "error": "Failed to fetch
        matches." }` |


        ---


        ## **Usage Notes**


        - Designed to fetch, normalize, and optionally **cache matches in the
        database**.
            
        - Supports **single-day queries**, **date ranges**, and **stage/team
        filtering**.
            
        - Returns **discovery metadata** to help clients understand available
        matchdays and stages.
            
        - Automatically **deduplicates and upserts matches** to prevent
        duplicates from multiple API calls.
            
        - If external API fails, the endpoint serves **cached database matches**
        as a fallback.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
security:
  - BearerAuth: []
