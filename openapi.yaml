    post:
      summary: Translate Post
      responses: {}
      tags:
        - Posts
      security:
        - BearerAuth: []
      description: >-
        ## **POST /api/post/\[id\]/translate** – Translate a Post


        Translate the content of a specific post into English using the Hugging
        Face Translation API (`Helsinki-NLP/opus-mt-mul-en`).


        ### **Headers**


        | Header | Required | Description |

        | --- | --- | --- |

        | `x-mock-external-apis` | Optional | If `true`, forces the API to
        return a mocked translation (used for testing). |


        ### **URL Parameters**


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `id` | number | Yes | ID of the post to translate. Must be a top-level
        post. |


        ### **Behavior & Rules**


        1. **Post Validation**
            
            - Checks if the post exists.
                
        2. **Translation**
            
            - Uses Hugging Face Translation API to convert post content to English.
                
            - In **mock mode**, returns a mocked translation string prefixed with `[MOCK]`.
                
        3. **Error Handling**
            
            - Invalid or missing post IDs.
                
            - Post not found.
                
            - Post is a reply (translation only allowed for top-level posts).
                
            - Issues with external API calls (Hugging Face).
                

        ---


        ### **Success Response (200 OK)**


        ```

        {  
             "id": "123",  
             "message": "Translation fetched successfully",  
             "originalText": "Hola, ¿cómo estás?",  
             "translatedText": "Hello, how are you?"
        }

         ```

        **Mock Response Example**


        ```

        {  
             "id": "123",  
             "message": "Translation fetched successfully",  
             "originalText": "Hola, ¿cómo estás?",  
             "translatedText": "[MOCK] Hola, ¿cómo estás?"     
        }

         ```

        ---


        ### **Error Responses**


        | Status | Condition | Response |

        | --- | --- | --- |

        | 404 | Post not found | `{ "error": "Post not found" }` |

        | 500 | External API failure or server error | `{ "error": "Failed to
        fetch translation" }` |


        ---


        ### **Notes**


        - Only **top-level posts** (posts without `parentId`) can be translated.
            
        - The endpoint is **POST** to allow passing headers for mock testing; no
        body parameters are required.
            
        - Mock mode is helpful for **unit testing** or when API usage is
        limited.
    parameters:
      - name: postId
        in: path
        required: true
        schema:
          type: string
