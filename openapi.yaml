        in: path
        required: true
        schema:
          type: string
  /api/admin/report/queue:
    get:
      summary: Get All Reports
      responses: {}
      tags:
        - Admin
      security:
        - BearerAuth: []
      description: >-
        # **GET /api/admin/report/queue**


        Retrieves a **list of all pending reports** for review by an **admin**,
        including AI-generated toxicity verdicts.


        Reports are grouped by **content** (post or thread) and **sorted** by
        severity and number of reports.


        ---


        # **Authentication**


        Include a **Bearer token** in the `Authorization` header:


        ```

        Authorization: Bearer <access_token>

         ```

        Only users with the **ADMIN** role can access this endpoint.


        ---


        # **Query Parameters**


        None. All unresolved reports are returned automatically.


        ---


        # **Response Fields**


        | Field | Type | Description |

        | --- | --- | --- |

        | `contentType` | string | `"POST"` or `"THREAD"` indicating type of
        content reported |

        | `contentId` | number | ID of the post or thread |

        | `reportCount` | number | Number of reports submitted against this
        content |

        | `worstAiVerdict` | string | AI moderation verdict: `"SAFE"`,
        `"WARNING"`, `"VIOLATION"` |

        | `highestToxicity` | number | Highest toxicity score among all reports
        for this content (0–1) |

        | `contentPreview` | string | A short preview (first 100 characters) of
        the content |

        | `aiExplanation` | string | Explanation from AI moderation model about
        the verdict |


        ---


        # **Example Request**


        ```

        GET /api/admin/report/queue

         ```

        Header:


        ```

        Authorization: Bearer <admin_access_token>

         ```

        ---


        # **Example Response (200 OK)**


        ```

        [  
             {    
             "contentType": "POST",    
             "contentId": 42,    
             "reportCount": 3,    
             "worstAiVerdict": "VIOLATION",    
             "highestToxicity": 0.92,    
             "contentPreview": "This is an example post content that violates community guidelines...",    
             "aiExplanation": "AI verdict VIOLATION: toxicity score 0.92 from unitary/toxic-bert."  
             },  
             {    
             "contentType": "THREAD",    
             "contentId": 15,    "reportCount": 1,    
             "worstAiVerdict": "WARNING",    
             "highestToxicity": 0.55,    
             "contentPreview": "Discussion about sensitive topics that may need review...",    
             "aiExplanation": "AI verdict WARNING: toxicity score 0.55 from unitary/toxic-bert."  
             }  
        ]

         ```

        ---


        # **401 Unauthorized**


        Returned if the request does not include a valid token, or the token is
        invalid/expired.


        ```

        {  "error": "Unauthorized"}

         ```

        ---


        # **403 Forbidden**


        Returned if the authenticated user is **not an admin**.


        ```

        {  "error": "Forbidden"}

         ```

        ---


        # **500 Internal Server Error**


        Returned if an unexpected server error occurs.


        ```

        {  "error": "Internal Server Error"}

         ```

        ---


        # **Notes**


        - Reports are **grouped by content** (`postId` or `threadId`).
            
        - AI moderation is performed using **Hugging Face's**
        **`unitary/toxic-bert`** model.
            
        - The **queue is sorted** by:
            
            1. `worstAiVerdict` severity (`VIOLATION > WARNING > SAFE`)
                
            2. Number of reports (`reportCount`)
                
        - The `aiExplanation` field provides context for the AI verdict, or a
        fallback if AI analysis is unavailable.
            
        - Only **pending reports** (`isResolved = false`) are returned.
  /api/digest/daily:
    get:
      summary: dailydigest
      parameters:
        - name: date
          in: query
          required: false
          description: 'Example: ?date=2026-02-20'
          deprecated: false
          schema: {}
          example: '2026-03-06'
        - name: Authorization
          in: header
          required: false
          deprecated: false
          schema: {}
          example: Bearer {{authToken}}
      responses: {}
      tags:
        - Digest
        - Daily
      description: >-
        # **GET /api/digest/daily**


        Fetches the **daily sports digest**, summarizing the day’s top
        discussions, match results, and current standings. Optionally, it
        generates an **AI-enhanced summary** using Hugging Face’s summarization
        models.


        ---


        ## **Query Parameters**


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `date` | string | No | Date in `YYYY-MM-DD` format. Defaults to the
        **current UTC date** if not provided. |


        ---


        ## **Behavior**


        1. Pulls **data for the specified date** (or today by default) from the
        database:
            
            - Top visible discussion threads
                
            - Recorded match results
                
            - Team standings
                
        2. Builds a **fallback digest** using database content (always
        returned).
            
        3. Prepares a **digest formatted for AI summarization**.
            
        4. Attempts **AI summarization** using Hugging Face
        (`facebook/bart-large-cnn`):
            
            - Checks **AI output quality**:
                
                - Discards low-quality or unsafe outputs
                    
                - Handles timeouts
                    
            - If AI passes checks, returns both fallback digest (`digest`) and AI summary (`aiDraft`)
                
        5. If AI fails, only the **fallback digest** is returned (`usedFallback:
        true`).
            

        ---


        ## **Success Response (200 OK)**


        ```

        {  
             "date": "2026-03-06",  
             "message": "Daily digest generated successfully",  
             "digest": "Daily digest for 2026-03-06. Top discussions included \"Team X wins\" ... Recorded results: Team A 2-1 Team B ... Standings snapshot: Team Y (10-3), Team Z (9-4) ...",  
             "aiDraft": "Optional AI-generated summary of the daily digest",  
             "sourceCounts": 
             {    
                  "discussions": 5,    "recordedMatches": 8,    "standingsTeams": 10  
             },       
             "usedFallback": true      
        }

         ```

        **Notes:**


        - `digest`: always contains a reliable summary from database content.
            
        - `aiDraft`: contains AI-generated summary if successful; otherwise
        `null`.
            
        - `usedFallback`: `true` if AI summary is unavailable or low-quality,
        `false` if AI summary is used.
            

        ---


        ## **Error Responses**


        ### **400 Invalid Date**


        ```

        {  "error": "Invalid date. Use YYYY-MM-DD."}

         ```

        ### **500 Missing AI Token**


        ```

        {  "error": "HF_TOKEN is not configured."}

         ```

        ### **500 AI Generation or Server Error**


        ```

        {  "error": "Failed to generate daily digest"}

         ```

        ---


        ## **Usage Notes**


        - **AI-enhanced summaries** are optional. The endpoint always returns a
        reliable fallback digest.
            
        - **Top threads**, **matches**, and **standings** are limited:
            
            - Threads: top 5 most active
                
            - Matches: last 8 recorded
                
            - Standings: top 10 teams
                
        - AI output is validated against:
            
            - Echoes of the input prompt (low-quality detection)
                
            - Inclusion of teams mentioned in matches and standings
                
        - Digest is **UTC-based**, so daily coverage is consistent across
        timezones.
  /api/standings:
    get:
      summary: standings
      parameters:
        - name: leagueType
          in: query
          schema:
            type: string
          example: NBA
        - name: abbreviation
          in: query
          schema:
            type: string
          example: EAST
        - name: leagueName
          in: query
          schema:
            type: string
          example: Eastern Conference
        - name: year
          in: query
          schema:
            type: integer
          example: '2025'
        - name: seasonType
          in: query
          schema:
            type: string
          example: Regular Season
        - name: refresh
          in: query
          schema:
            type: boolean
          example: 'true'
      responses: {}
      tags:
        - Standings
      description: >-
        # **GET /api/standings**


        Fetches **NBA standings** with optional filters. Returns normalized
        standings data, along with metadata about the data source (database
        cache or external API) and pagination details.


        ---


        ## **Query Parameters**


        | Parameter | Type | Required | Default | Description |

        | --- | --- | --- | --- | --- |

        | `leagueType` | string | No | `"NBA"` | Only `"NBA"` is supported. |

        | `abbreviation` | string | No | `null` | Conference shorthand (`EAST`
        or `WEST`). |

        | `leagueName` | string | No | `null` | Full conference/league name. |

        | `year` | string | No | Current year | Season year for which standings
        are requested. |

        | `seasonType` | string | No | `"Regular Season"` | Season type, e.g.,
        `"Regular Season"` or `"Playoffs"`. |

        | `refresh` | boolean | No | `false` | If `true`, forces fetching the
        latest data from the external API instead of using cached DB data. |


        ---


        ## **Behavior**


        1. Reads standings from the **database first**.
            
        2. If the cached data is **fresh** (updated within the last hour) and
        `refresh` is not `true`:
            
            - Returns **database cache** standings.
                
        3. If data is stale or `refresh=true`:
            
            - Calls **external API** for updated standings.
                
            - Cleans and normalizes the data.
                
            - Upserts teams into the database for future use.
                
            - Returns the latest standings.
                
        4. If external API fails:
            
            - Returns **stale cached data** if available.
                
            - Otherwise, returns a `500` error.
                

        ---


        ## **Success Response (200 OK)**


        ```

        {  
             "filters": {    "leagueType": "NBA",    "abbreviation": "EAST",    "leagueName": null,    "year": "2026",    "seasonType": "Regular Season"  },  
             "leagueName": "Eastern Conference",  
             "abbreviation": "EAST",  
             "year": "2026",  
             "seasonType": "Regular Season",  
             "startDate": "2025-10-01",  
             "endDate": "2026-04-15",  
             "count": 15,  
             "standings": [    
                  {      
                  "id": 1,      "teamId": "1",      "name": "Boston Celtics",      "logoUrl": "https://...",      "abbreviation": "BOS",      "wins": 48,      "losses": 22,      "rank": 1,      "winPct": 0.686,      "gamesBack": 0,      "streak": "W3",      "homeRecord": "27-8",      "awayRecord": "21-14",      "lastTenRecord": "7-3",      "pointsFor": 118.2,      "pointsAgainst": 110.4,      "conference": "Eastern Conference",      "division": "Atlantic",      "stats": [],      "updatedAt": "2026-03-06T12:00:00.000Z"    
                  }  
             ],  
             "dataSource": "external-api",  
             "pagination": null,  
             "plan": null     
        }

         ```

        **Notes:**


        - `dataSource`: Indicates whether the data came from `database-cache`,
        `external-api`, or `database-fallback`.
            
        - `standings`: Array of normalized team standings.
            
        - Pagination may be provided if multiple pages were fetched from the
        external API.
            

        ---


        ## **Error Responses**


        ### **400 Invalid League Type**


        ```

        {  "error": "Only leagueType=NBA is supported by this endpoint."}

         ```

        ### **500 External or Internal Error**


        ```

        {  "error": "Failed to fetch standings."}

         ```

        ### **Fallback Warning (Optional)**


        ```

        {  
             "filters": { ... },  
             "leagueName": "Eastern Conference",  
             "abbreviation": "EAST",  "year": "2026",  
             "seasonType": "Regular Season",  
             "count": 15,  
             "standings": [ ... ],  
             "dataSource": "database-fallback",  
             "stale": true,  
             "warning": "Serving stale standings cache because upstream refresh failed."
        }

         ```

        ---


        ## **Usage Notes**


        - Only **NBA** standings are supported.
            
        - Cached data is considered **fresh for 1 hour**.
            
        - `refresh=true` forces external API fetch even if cache is fresh.
            
        - Filters such as `abbreviation` and `leagueName` allow narrowing down
        to a specific conference.
            
        - Returned standings are **normalized** for easier consumption by
        clients, with consistent keys like `wins`, `losses`, `rank`, `winPct`,
        `streak`, and `pointsFor/pointsAgainst`.
  /api/teams:
    get:
      summary: teams
      parameters:
        - name: league
          in: query
          description: Optional league filter
          schema:
            type: string
          example: NBA
        - name: displayName
          in: query
          description: Optional more "user facing" name filter
          schema:
            type: string
          example: Los Angeles Lakers
        - name: abbreviation
          in: query
          description: Optional abbreviation filter
          schema:
            type: string
          example: LAL
        - name: name
          in: query
          schema:
            type: string
          example: Lakers
      responses: {}
      tags:
        - Teams
      description: >-
        # **GET /api/teams**


        Fetches **NBA teams** from the external API, normalizes the data,
        upserts into the database, and returns the saved team records.


        ---


        ## **Query Parameters**


        | Parameter | Type | Required | Default | Description |

        | --- | --- | --- | --- | --- |

        | `league` | string | No | `"NBA"` | League to fetch teams from.
        Currently only `"NBA"` is supported. |

        | `name` | string | No | `null` | Exact or partial match on team name. |

        | `displayName` | string | No | `null` | Filter by team display name. |

        | `abbreviation` | string | No | `null` | Team abbreviation (e.g.,
        `"BOS"`, `"RAP"`). |


        ---


        ## **Behavior**


        1. Calls **external API** with provided filters.
            
        2. Normalizes each team record:
            
            - `name`: standardized team name.
                
            - `logoUrl`: team logo URL.
                
            - `conference`: defaults to `"Unknown"` if missing.
                
            - `division`: defaults to `"Unknown"` if missing.
                
        3. **Upserts** the team into the database:
            
            - If the team already exists, updates `logoUrl`, `conference`, and `division`.
                
            - If the team does not exist, creates a new record with `wins: 0` and `losses: 0`.
                
        4. Returns the **saved team records** with all normalized fields.
            
        5. If no query parameters are provided, returns **all teams in the
        league**.
            

        ---


        ## **Success Response (200 OK)**


        ```

        {  
             "count": 30,  
             "teams": [    
                {      "id": 1,      "name": "Boston Celtics",      "logoUrl": "https://example.com/boston.png",      "wins": 0,      "losses": 0,      "conference": "Eastern Conference",      "division": "Atlantic"    },    
                {      "id": 2,      "name": "Toronto Raptors",      "logoUrl": "https://example.com/toronto.png",      "wins": 0,      "losses": 0,      "conference": "Eastern Conference",      "division": "Atlantic"    }  
                
             ],  
             "dataSource": "external-api"
        }

         ```

        **Notes:**


        - `count`: Number of teams returned.
            
        - `teams`: Array of normalized team records.
            
        - `dataSource`: Indicates the data source (`external-api`).
            

        ---


        ## **Error Responses**


        ### **500 Missing Configuration**


        ```

        {  "error": "NBA_API_BASE_URL is not configured."}

         ```

        ### **502 Upstream API Failure**


        ```

        {  "error": "Failed to fetch team data from upstream provider."}

         ```

        ### **500 Internal Error**


        ```

        {  "error": "Failed to sync teams."}

         ```

        ---


        ## **Usage Notes**


        - Designed to **populate the database** with team data initially and
        keep it updated periodically.
            
        - Normalizes all fields for consistent consumption in downstream
        endpoints (e.g., `/standings`, `/matches`).
            
        - If filters are used, only matching teams are returned; otherwise, all
        teams in the league are returned.
      requestBody:
        content:
          application/json:
            schema:
              type: object
