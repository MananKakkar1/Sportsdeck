openapi: 3.0.0
info:
  title: Main Collection
  version: 1.0.0
  description: Contains the Postman docs for all of our api/endpoionts.
servers:
  - url: http://localhost:3000
paths:
  /api/threads:
    get:
      summary: Get Thread
      responses:
        default:
          description: Get Thread by Title
      tags:
        - Threads
      description: >-
        ## Create Thread


        **POST** `/api/threads`


        Creates a new thread with a main post.


        ### Headers


        ```

        Authorization: Bearer <access_token>

        Content-Type: application/json

         ```

        ### Request Body


        ``` json

        {
          "title": "string (required)",
          "mainPostId": "number (required)",
          "teamId": "number (optional)",
          "tags": ["string"] (optional)
        }

         ```

        ### Parameters


        - `title` (required): The title of the thread
            
        - `mainPostId` (required): ID of the post to use as the thread's main
        post
            
        - `teamId` (optional): ID of the team this thread is associated with
            
        - `tags` (optional): Array of tag names to associate with the thread
            

        ### Success Response


        **Code:** `200 OK`


        ``` json

        {
            "id": 1,
            "title": "Lakers vs Warriors Game Discussion",
            "createdById": 5,
            "teamId": 3,
            "mainPostId": 42,
            "createdAt": "2026-03-06T10:00:00.000Z",
            "tags": [
                {
                    "tag": {
                        "id": 1,
                        "name": "game-thread"
                    }
                }
            ],
            "mainPost": {
                "id": 42,
                "content": "What a game!",
                "authorId": 5
            }
        }

         ```

        ### Error Responses


        **Code:** `401 Unauthorized`


        ``` json

        {
            "error": "Unauthorized"
        }

         ```

        **Code:** `403 Forbidden`


        ``` json

        {
            "error": "User is banned"
        }

         ```

        **Code:** `400 Bad Request`


        ``` json

        {
            "error": "Title and mainPostId are required fields."
        }

         ```

        ``` json

        {
            "error": "mainPostId must be a valid number."
        }

         ```

        ``` json

        {
            "error": "This post is already used as a main post for another thread."
        }

         ```

        **Code:** `404 Not Found`


        ``` json

        {
            "error": "Post not found."
        }

         ```

        ``` json

        {
            "error": "Team not found."
        }

         ```

        **Code:** `500 Internal Server Error`


        ``` json

        {
            "error": "Failed to create thread"
        }

         ```

        ---
  /api/threads/:
    post:
      summary: Create Thread
      responses:
        default:
          description: Create Thread with Tags
      tags:
        - Threads
      security:
        - BearerAuth: []
      description: "## Get Threads\n\n**GET** `/api/threads`\n\nRetrieves a paginated list of threads with optional filters.\n\n### Query Parameters\n\n- `title` (optional): Filter threads by title (contains)\n- `author` (optional): Filter by author username\n- `team` (optional): Filter by team name\n- `tags` (optional): Filter by tag names (can be comma-separated or multiple query params)\n- `page` (optional, default: 1): Page number for pagination\n- `pageSize` (optional, default: 10): Number of items per page\n\n### Example Request\n\n```\nGET /api/threads?page=1&pageSize=10&team=Lakers&tags=game-thread,playoffs\n```\n\n### Success Response\n\n**Code:** `200 OK`\n\n```json\n[\n\t{\n\t\t\"id\": 1,\n\t\t\"title\": \"Lakers vs Warriors Discussion\",\n\t\t\"createdById\": 5,\n\t\t\"teamId\": 3,\n\t\t\"mainPostId\": 42,\n\t\t\"isVisible\": true,\n\t\t\"isClosed\": false,\n\t\t\"matchId\": null,\n\t\t\"opensAt\": null,\n\t\t\"closesAt\": null,\n\t\t\"createdAt\": \"2026-03-06T10:00:00.000Z\",\n\t\t\"updatedAt\": \"2026-03-06T10:00:00.000Z\",\n\t\t\"tags\": [\n\t\t\t{\n\t\t\t\t\"tag\": {\n\t\t\t\t\t\"id\": 1,\n\t\t\t\t\t\"name\": \"game-thread\"\n\t\t\t\t}\n\t\t\t}\n\t\t]\n\t}\n]\n```\n\n### Error Responses\n\n**Code:** `400 Bad Request`\n\n```json\n{\n\t\"error\": \"Page and pageSize must be positive integers.\"\n}\n```\n\n**Code:** `404 Not Found`\n\n```json\n{\n\t\"error\": \"Author not found.\"\n}\n```\n\n```json\n{\n\t\"error\": \"Team not found.\"\n}\n```\n\n**Code:** `500 Internal Server Error`\n\n```json\n{\n\t\"error\": \"Error fetching threads.\"\n}\n```\n\n### Notes\n\n- Only returns visible threads\n- For threads associated with matches, only returns threads that are currently open (between opensAt and closesAt)\n- Tags can be specified multiple ways:\n    - `?tags=tag1,tag2` (comma-separated)\n    - `?tags=tag1&tags=tag2` (multiple params)"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                mainPostId:
                  type: string
            example:
              title: Sample Title
              mainPostId: ''
  /api/threads/{threadId}:
    put:
      summary: Update Thread
      responses:
        default:
          description: Close Thread
      tags:
        - Threads
      security:
        - BearerAuth: []
      description: >-
        ## Update Thread


        **PUT** `/api/threads/{id}`


        Updates a thread. Only the thread creator or an admin can update a
        thread.


        ### Headers


        ```

        Authorization: Bearer <access_token>

        Content-Type: application/json

         ```

        ### Path Parameters


        - `id` (required): The ID of the thread to update
            

        ### Request Body


        ``` json

        {
            "title": "string (optional)",
            "mainPost": "string (optional)",
            "isClosed": "boolean (optional)"
        }

         ```

        ### Parameters


        - `title` (optional): New title for the thread
            
        - `mainPost` (optional): Updated main post content
            
        - `isClosed` (optional): Whether the thread is closed
            

        ### Success Response


        **Code:** `200 OK`


        ``` json

        {
            "id": 1,
            "title": "Updated Thread Title",
            "createdById": 5,
            "teamId": 3,
            "mainPostId": 42,
            "isClosed": false,
            "isVisible": true,
            "matchId": null,
            "opensAt": null,
            "closesAt": null,
            "createdAt": "2026-03-06T10:00:00.000Z",
            "updatedAt": "2026-03-06T11:30:00.000Z"
        }

         ```

        ### Error Responses


        **Code:** `401 Unauthorized`


        ``` json

        {
            "error": "Unauthorized"
        }

         ```

        **Code:** `403 Forbidden`


        ``` json

        {
            "error": "User is banned"
        }

         ```

        ``` json

        {
            "error": "User is not the owner of the thread or an admin"
        }

         ```

        **Code:** `400 Bad Request`


        ``` json

        {
            "error": "Invalid thread ID"
        }

         ```

        **Code:** `404 Not Found`


        ``` json

        {
            "error": "Thread not found."
        }

         ```

        **Code:** `500 Internal Server Error`


        ``` json

        {
            "error": "Failed to update thread"
        }

         ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
            example:
              title: Updated Title
    parameters:
      - name: threadId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete Thread
      responses: {}
      tags:
        - Threads
      security:
        - BearerAuth: []
      description: >-
        ## Delete Thread


        **DELETE** `/api/threads/{id}`


        Deletes a thread. Only the thread creator or an admin can delete a
        thread.


        ### Headers


        ```

        Authorization: Bearer <access_token>

         ```

        ### Path Parameters


        - `id` (required): The ID of the thread to delete
            

        ### Success Response


        **Code:** `200 OK`


        ``` json

        {
            "message": "Thread deleted successfully"
        }

         ```

        ### Error Responses


        **Code:** `401 Unauthorized`


        ``` json

        {
            "error": "Unauthorized"
        }

         ```

        **Code:** `403 Forbidden`


        ``` json

        {
            "error": "User is banned"
        }

         ```

        ``` json

        {
            "error": "User is not the owner of the thread or an admin"
        }

         ```

        **Code:** `400 Bad Request`


        ``` json

        {
            "error": "Invalid thread ID"
        }

         ```

        **Code:** `404 Not Found`


        ``` json

        {
            "error": "Thread not found"
        }

         ```

        **Code:** `500 Internal Server Error`


        ``` json

        {
            "error": "Failed to delete thread"
        }

         ```

        ### Notes


        - Cascade delete will automatically remove associated posts, polls,
        tags, and reports
  /api/threads/{threadId}/report/:
    post:
      summary: Report Thread
      responses: {}
      tags:
        - Threads
      security:
        - BearerAuth: []
      description: |-
        ## Report Thread

        **POST** `/api/threads/{id}/report`

        Reports a thread for inappropriate content. Uses AI to analyze toxicity.

        ### Headers

        ```
        Authorization: Bearer <access_token>
        Content-Type: application/json

         ```

        ### Path Parameters

        - `id` (required): The ID of the thread to report
            

        ### Request Body

        ``` json
        {
            "reason": "string (required)"
        }

         ```

        ### Parameters

        - `reason` (required): Explanation for why the thread is being reported
            

        ### Success Response

        **Code:** `201 Created`

        ``` json
        {
            "message": "Thread reported successfully",
            "report": {
                "id": 10,
                "toxicity": 0.85,
                "aiVerdict": "toxic",
                "reportedById": 5,
                "threadId": 1,
                "reason": "Contains hate speech",
                "createdAt": "2026-03-06T10:00:00.000Z"
            }
        }

         ```

        ### Error Responses

        **Code:** `401 Unauthorized`

        ``` json
        {
            "error": "Unauthorized"
        }

         ```

        **Code:** `403 Forbidden`

        ``` json
        {
            "error": "User is banned"
        }

         ```

        **Code:** `400 Bad Request`

        ``` json
        {
            "error": "Reason is required"
        }

         ```

        ``` json
        {
            "error": "Invalid thread ID"
        }

         ```

        ``` json
        {
            "error": "You have already reported this thread"
        }

         ```

        **Code:** `404 Not Found`

        ``` json
        {
            "error": "Thread not found"
        }

         ```

        ``` json
        {
            "error": "Main post of thread not found"
        }

         ```

        **Code:** `500 Internal Server Error`

        ``` json
        {
            "error": "Internal Server Error"
        }

         ```

        ### Notes

        - AI model used: `unitary/toxic-bert`
            
        - Toxicity score ranges from 0 (non-toxic) to 1 (toxic)
            
        - Users can only report a thread once
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
            example:
              reason: This is a report for a thread.
    parameters:
      - name: threadId
        in: path
        required: true
        schema:
          type: string
  /api/threads/{threadId}/sentiment:
    post:
      summary: Create Sentiment
      responses: {}
      tags:
        - Threads
      security:
        - BearerAuth: []
      description: |-
        ## Create Sentiment Analysis

        **POST** `/api/threads/{id}/sentiment`

        Performs sentiment analysis on all posts in a match-associated thread.

        ### Headers

        ```
        Authorization: Bearer <access_token>

         ```

        ### Path Parameters

        - `id` (required): The ID of the thread to analyze
            

        ### Success Response

        **Code:** `200 OK`

        ``` json
        {
            "id": 5,
            "matchId": 12,
            "overall": 0.65,
            "homeTeam": 0.72,
            "awayTeam": -0.45,
            "numPosts": 150
        }

         ```

        ### Response Fields

        - `id`: Sentiment record ID
            
        - `matchId`: Associated match ID
            
        - `overall`: Overall sentiment score (-1 to 1)
            
        - `homeTeam`: Sentiment towards home team (-1 to 1)
            
        - `awayTeam`: Sentiment towards away team (-1 to 1)
            
        - `numPosts`: Number of posts analyzed
            

        ### Error Responses

        **Code:** `401 Unauthorized`

        ``` json
        {
            "error": "Unauthorized"
        }

         ```

        **Code:** `403 Forbidden`

        ``` json
        {
            "error": "User is banned"
        }

         ```

        **Code:** `400 Bad Request`

        ``` json
        {
            "error": "Invalid thread ID"
        }

         ```

        ``` json
        {
            "error": "Thread is not associated with a match"
        }

         ```

        ``` json
        {
            "error": "No posts found in thread"
        }

         ```

        **Code:** `404 Not Found`

        ``` json
        {
            "error": "Thread not found"
        }

         ```

        ``` json
        {
            "error": "Match not found"
        }

         ```

        ``` json
        {
            "error": "Teams not found"
        }

         ```

        **Code:** `500 Internal Server Error`

        ``` json
        {
            "error": "Failed to perform sentiment analysis"
        }

         ```

        ### Notes

        - AI model used: `cardiffnlp/twitter-roberta-base-sentiment-latest`
            
        - Sentiment scores: positive (1), negative (-1), neutral (0)
            
        - Posts are processed in batches to avoid input size limits
            
        - Maximum input length: 512 characters per batch
            
        - Batch size: 10 posts
    parameters:
      - name: threadId
        in: path
        required: true
        schema:
          type: string
